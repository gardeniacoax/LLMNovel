<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说AI改写/续写工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="app" class="flex flex-col h-screen">
        <header id="navbar" class="bg-slate-800 border-b border-slate-700">
            <nav class="flex items-center justify-between px-6 py-3">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/>
                    </svg>
                    <span class="text-xl font-bold">小说AI工具</span>
                </div>
                
                <div class="flex space-x-1">
                    <a href="#home" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">工作台</a>
                    <a href="#text-analysis" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">文本分析</a>
                    <a href="#plot-cards" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">剧情卡</a>
                    <a href="#continue" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">续写</a>
                    <a href="#rewrite" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">改写</a>
                    <a href="#styles" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">文风卡</a>
                    <a href="#roles" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">角色卡</a>
                    <a href="#config" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">全局配置</a>
                    <a href="#api" class="nav-link px-4 py-2 rounded hover:bg-slate-700 transition-colors">API设置</a>
                </div>
            </nav>
        </header>
        
        <div class="flex flex-1 overflow-hidden">
            <aside id="sidebar" class="w-64 bg-slate-800 border-r border-slate-700 flex-shrink-0 hidden">
            </aside>
            
            <main id="main-content" class="flex-1 overflow-y-auto p-6">
                <div class="flex items-center justify-center h-full">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                        <p class="text-slate-400">加载中...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
    
    <div id="modal-container" class="hidden"></div>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
